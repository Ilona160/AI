<html lang="uk">
<head>
    <meta charset="UTF-8" />

    <title>Теорія · Введення в ШІ</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
        /* Вставляємо ваші змінні та базові стилі з index.html */
        :root {
            --bg: #0a0e1a; --surface: #111827; --card: #161d2e;

            --muted: #64748b; --heading: #f8fafc;

        body {
            font-family: 'DM Sans', sans-serif;

            line-height: 1.7;
            padding: 2rem;

        .content-container {
            max-width: 800px;
            margin: 100px auto;

            padding: 3rem;

            border: 1px solid var(--border);
        }
        h1, h2, h3 { font-family: 'Syne', sans-serif; color: var(--heading); margin-top: 2rem; }
        h1 { color: var(--accent); border-bottom: 2px solid var(--border); padding-bottom: 1rem; }
        code { background: #000; padding: 0.2rem 0.4rem; border-radius: 4px; color: var(--accent); }
        .back-link { color: var(--accent); text-decoration: none; font-weight: bold; }
    </style>
</head>

        <h1>Розділ 1: Введення у Штучний Інтелект</h1>
        
        <h2>1.1. Що таке ШІ?</h2>
        <p>Штучний інтелект (ШІ) — це здатність комп'ютерної системи імітувати когнітивні функції людини[cite: 3]. Ми вивчаємо вузький (ANI), загальний (AGI) та надзагальний (ASI) ШІ[cite: 37].</p>
        
        </div>
