<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0e1a; --surface: #111827; --card: #161d2e; --border: #1e2d45;
      --accent: #00d4ff; --text: #e2e8f0; --heading: #f8fafc;
    }
    
    body {
      font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text);
      line-height: 1.6; padding: 100px 15px 60px; margin: 0;
      background-image: radial-gradient(circle at 2px 2px, var(--border) 1px, transparent 0);
      background-size: 40px 40px;
    }

    /* НАВІГАЦІЯ */
    nav {
      position: fixed; top: 0; left: 0; width: 100%;
      background: rgba(10, 14, 26, 0.96); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border); 
      padding: 0.7rem 1rem; 
      display: flex; 
      justify-content: flex-start;
      align-items: center; 
      gap: 12px;
      z-index: 1000;
    }

    .nav-logo { 
      font-family: 'Syne', sans-serif; font-weight: 800; color: var(--accent); 
      text-decoration: none; font-size: 0.9rem;
      white-space: nowrap;
      padding-right: 10px;
      border-right: 1px solid var(--border);
    }

    .nav-link { 
      color: var(--text); text-decoration: none; font-size: 0.85rem; 
      display: flex; align-items: center; gap: 6px;
      padding: 8px 12px; border-radius: 8px; background: var(--surface);
      border: 1px solid var(--border);
      white-space: nowrap; 
      flex-shrink: 0;
      transition: 0.2s;
    }
    .nav-link:hover { border-color: var(--accent); color: var(--accent); }

    .container { max-width: 850px; margin: 0 auto; }

    /* ТЕКСТ ТА КОНТЕНТ */
    h1, h2, h3 { font-family: 'Syne', sans-serif; color: var(--heading); margin-top: 2rem; }
    h1 { font-size: 2.2rem; color: var(--accent); margin-bottom: 1.5rem; }
    p { margin-bottom: 1.2rem; }

    /* Спеціальні блоки для тексту (використовуйте у файлах теорії) */
    .content-block { 
      background: var(--card); 
      border: 1px solid var(--border); 
      padding: 2rem; 
      border-radius: 24px; 
      margin-bottom: 2rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    /* КАРТКИ ДЛЯ СТОРІНОК ВИБОРУ (Theory Index / Tests Index) */
    .theory-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
      margin: 2rem 0;
    }
    .theory-card {
      background: var(--card); border: 1px solid var(--border);
      padding: 1.5rem; border-radius: 20px; text-decoration: none;
      transition: 0.3s; display: block; color: var(--text);
    }
    .theory-card:hover { border-color: var(--accent); transform: translateY(-5px); }
    .theory-card h3 { margin-top: 0; color: var(--accent); font-size: 1.2rem; }
    .theory-card p { font-size: 0.85rem; color: #64748b; margin-bottom: 0; }

    /* ТЕСТИ ТА КНОПКИ */
    .quiz-btn {
      display: block; width: 100%; text-align: left; padding: 1.1rem; margin-top: 0.8rem;
      background: var(--surface); border: 1px solid var(--border); color: var(--text);
      border-radius: 12px; cursor: pointer; transition: 0.2s; font-size: 1rem;
    }
    .correct { border-color: #10b981 !important; background: rgba(16, 185, 129, 0.1) !important; color: #10b981 !important; }
    .incorrect { border-color: #ef4444 !important; background: rgba(239, 68, 68, 0.1) !important; color: #ef4444 !important; }
    .feedback { display: none; margin-top: 1rem; padding: 1rem; background: rgba(0, 212, 255, 0.03); border-left: 3px solid var(--accent); border-radius: 8px; font-size: 0.9rem; }

    /* СТИЛІ ДЛЯ ПРИКЛАДІВ (Examples) */
    blockquote {
      border-left: 4px solid var(--accent); background: rgba(0, 212, 255, 0.05);
      padding: 1rem 1.5rem; margin: 1.5rem 0; border-radius: 0 12px 12px 0;
    }
    pre { background: #000; padding: 1rem; border-radius: 10px; overflow-x: auto; border: 1px solid var(--border); color: #00ffcc; font-size: 0.9rem; }
  </style>
</head>
<body>
  <nav>
    <a href="https://ilona160.github.io/AI/" class="nav-logo">ШІ · КУРС</a>
    <a href="https://ilona160.github.io/AI/" class="nav-link"><span>←</span> На головну</a>
  </nav>

  <div class="container">
    {{ content }}
  </div>

  <script>
    function check(btn, isCorrect, explanation) {
      const parent = btn.parentElement;
      const buttons = parent.querySelectorAll('.quiz-btn');
      buttons.forEach(b => { b.style.pointerEvents = 'none'; b.style.opacity = '0.5'; });
      btn.style.opacity = '1';
      if(isCorrect) {
        btn.classList.add('correct');
      } else {
        btn.classList.add('incorrect');
        buttons.forEach(b => { 
          if(b.getAttribute('onclick').includes('true')) { 
            b.classList.add('correct'); b.style.opacity = '1'; 
          } 
        });
      }
      const fb = parent.querySelector('.feedback');
      if(fb) { fb.innerHTML = explanation; fb.style.display = 'block'; }
    }
  </script>
</body>
</html>
