<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0e1a; --surface: #111827; --card: #161d2e; --border: #1e2d45;
      --accent: #00d4ff; --text: #e2e8f0; --heading: #f8fafc;
    }
    
    body {
      font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text);
      line-height: 1.6; padding: 120px 20px 60px; margin: 0;
      background-image: radial-gradient(circle at 2px 2px, var(--border) 1px, transparent 0);
      background-size: 40px 40px;
    }

    /* НАВІГАЦІЯ: Зміщуємо все максимально ліворуч */
    nav {
      position: fixed; top: 0; left: 0; width: 100%;
      background: rgba(10, 14, 26, 0.95); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border); 
      padding: 1rem 2rem; 
      display: flex; 
      justify-content: flex-start; /* ВСЕ ЛІВОРУЧ */
      align-items: center; 
      gap: 30px; /* Відстань між лого та кнопкою */
      z-index: 1000;
    }

    .nav-logo { 
      font-family: 'Syne', sans-serif; font-weight: 800; color: var(--accent); 
      text-decoration: none; font-size: 1.1rem;
      white-space: nowrap;
    }

    .nav-link { 
      color: var(--text); text-decoration: none; font-size: 0.95rem; 
      display: flex; align-items: center; gap: 8px;
      padding: 10px 20px; border-radius: 12px; background: var(--surface);
      border: 1px solid var(--border);
      white-space: nowrap; 
      transition: 0.3s;
    }
    .nav-link:hover { border-color: var(--accent); background: rgba(0, 212, 255, 0.1); color: var(--accent); }

    .container { max-width: 800px; margin: 0 auto; }
    .content-block { background: var(--card); border: 1px solid var(--border); padding: 2rem; border-radius: 24px; margin-bottom: 2rem; }

    /* Кнопки тесту */
    .quiz-btn {
      display: block; width: 100%; text-align: left; padding: 1.2rem; margin-top: 1rem;
      background: var(--surface); border: 1px solid var(--border); color: var(--text);
      border-radius: 12px; cursor: pointer; transition: 0.3s; font-size: 1rem;
    }
    .quiz-btn:hover { border-color: var(--accent); background: rgba(0, 212, 255, 0.05); }
    .correct { border-color: #10b981 !important; background: rgba(16, 185, 129, 0.15) !important; color: #10b981 !important; }
    .incorrect { border-color: #ef4444 !important; background: rgba(239, 68, 68, 0.15) !important; color: #ef4444 !important; }
    .feedback { display: none; margin-top: 1.2rem; padding: 1.2rem; background: rgba(0, 212, 255, 0.05); border-left: 4px solid var(--accent); border-radius: 8px; }

    h1 { font-family: 'Syne', sans-serif; font-size: 2.2rem; color: var(--heading); }
  </style>
</head>
<body>
  <nav>
    <a href="https://ilonamoria.github.io/ai-course/" class="nav-logo">ШІ · ЛАБОРАТОРНА</a>
    <a href="/ai-course/index.html" class="nav-link"><span>←</span> На головну</a>
  </nav>

  <div class="container">
    {{ content }}
  </div>

  <script>
    // Цей скрипт ПРИМУСОВО виправляє посилання на головну, якщо ви на GitHub Pages
    document.querySelectorAll('a[href="/ai-course/index.html"]').forEach(link => {
      link.addEventListener('click', function(e) {
        // Якщо посилання не спрацює через налаштування сервера, спробуємо знайти корінь вручну
        if(window.location.hostname.includes('github.io')) {
           window.location.href = window.location.origin + '/ai-course/';
           e.preventDefault();
        }
      });
    });

    function check(btn, isCorrect, explanation) {
      const parent = btn.parentElement;
      const buttons = parent.querySelectorAll('.quiz-btn');
      buttons.forEach(b => { b.style.pointerEvents = 'none'; b.style.opacity = '0.5'; });
      btn.style.opacity = '1';
      if(isCorrect) {
        btn.classList.add('correct');
      } else {
        btn.classList.add('incorrect');
        buttons.forEach(b => { if(b.getAttribute('onclick').includes('true')) { b.classList.add('correct'); b.style.opacity = '1'; } });
      }
      const fb = parent.querySelector('.feedback');
      if(fb) { fb.innerHTML = explanation; fb.style.display = 'block'; }
    }
  </script>
</body>
</html>
