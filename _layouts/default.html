<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0e1a; --surface: #111827; --card: #161d2e; --border: #1e2d45;
      --accent: #00d4ff; --text: #e2e8f0; --muted: #64748b;
    }
    body {
      font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text);
      line-height: 1.6; padding: 100px 20px;
      background-image: radial-gradient(circle at 2px 2px, var(--border) 1px, transparent 0);
      background-size: 40px 40px;
    }
    .container { max-width: 800px; margin: 0 auto; }
    
    /* Стиль блоку з питанням */
    .content-block {
      background: var(--card); border: 1px solid var(--border);
      padding: 2rem; border-radius: 20px; margin-bottom: 2rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    /* Стиль кнопок-варіантів (виправляємо білі прямокутники) */
    .quiz-btn {
      display: block; width: 100%; text-align: left;
      padding: 1rem 1.5rem; margin-top: 0.8rem;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); border-radius: 12px;
      cursor: pointer; font-size: 1rem; transition: all 0.3s ease;
    }
    .quiz-btn:hover { border-color: var(--accent); background: rgba(0, 212, 255, 0.05); }

    /* Стани після натискання */
    .correct { border-color: #10b981 !important; background: rgba(16, 185, 129, 0.15) !important; color: #10b981 !important; font-weight: 600; }
    .incorrect { border-color: #ef4444 !important; background: rgba(239, 68, 68, 0.15) !important; color: #ef4444 !important; }
    
    .quiz-btn:disabled { cursor: default; }

    h1 { font-family: 'Syne', sans-serif; color: var(--accent); margin-bottom: 2rem; }
  </style>
</head>
<body>
  <div class="container">
    {{ content }}
  </div>

  <script>
    function check(btn, isCorrect) {
      const parent = btn.parentElement;
      const buttons = parent.querySelectorAll('.quiz-btn');
      
      // Блокуємо всі кнопки в цьому питанні після натискання
      buttons.forEach(b => {
        b.disabled = true;
      });
      
      if(isCorrect) {
        btn.classList.add('correct');
      } else {
        btn.classList.add('incorrect');
      }
    }
  </script>
</body>
</html>
